<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RL Overlay</title>
    <link rel="stylesheet" href="../../overlay.css" />
  </head>
  <body>
    <div id="overlay">
      <div class="team left"><span id="blue-name">Blue</span><span id="blue-score">0</span><span id="blue-series">0</span></div>
      <div class="center"><span id="format">BO5</span><span id="overtime" hidden>OT</span></div>
      <div class="team right"><span id="orange-name">Orange</span><span id="orange-score">0</span><span id="orange-series">0</span></div>
    </div>
    <div id="status" hidden>Bridge disconnected</div>
    <script src="../../overlay.js"></script>
  </body>
</html>
