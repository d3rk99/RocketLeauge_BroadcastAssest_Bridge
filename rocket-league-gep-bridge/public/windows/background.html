<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RL Bridge Background</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        padding: 16px;
        font-family: Arial, sans-serif;
        background: #0f1422;
        color: #dbe5ff;
      }
      .card {
        border: 1px solid #263252;
        border-radius: 8px;
        background: #131c2f;
        padding: 12px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }
      p {
        margin: 0;
        font-size: 13px;
        line-height: 1.4;
      }
      code {
        background: #0b111d;
        padding: 1px 4px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Rocket League GEP Bridge</h1>
      <p>Background page booted. If this window is visible, startup HTML loaded and <code>background.js</code> should be running.</p>
    </div>
    <script src="../../background.js"></script>
  </body>
</html>
