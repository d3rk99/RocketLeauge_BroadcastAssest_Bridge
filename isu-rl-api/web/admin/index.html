<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ISU RL API Admin</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h1>ISU RL API Admin</h1>

    <label>Backend URL <input id="base" value="http://localhost:8000" /></label>
    <label>API Key <input id="api-key" value="dev-api-key" /></label>
    <div id="status">Disconnected</div>

    <section>
      <h2>Teams & Series</h2>
      <input id="blue-team" placeholder="Blue team" />
      <input id="orange-team" placeholder="Orange team" />
      <input id="best-of" type="number" min="1" value="5" />
      <button id="set-teams">Set teams / BO</button>
    </section>

    <section>
      <h2>Mode</h2>
      <button id="mode-auto">Auto</button>
      <button id="mode-manual">Manual</button>
      <button id="reset">Reset Match</button>
    </section>

    <section>
      <h2>Manual Score Controls</h2>
      <input id="blue-score" type="number" min="0" placeholder="Blue score" />
      <input id="orange-score" type="number" min="0" placeholder="Orange score" />
      <input id="blue-series" type="number" min="0" placeholder="Blue series wins" />
      <input id="orange-series" type="number" min="0" placeholder="Orange series wins" />
      <button id="save-score">Apply Manual Values</button>
    </section>

    <section>
      <h2>Current State</h2>
      <pre id="state-json">{}</pre>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
