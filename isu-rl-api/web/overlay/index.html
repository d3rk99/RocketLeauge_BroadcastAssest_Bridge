<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ISU RL API Overlay</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="scorebug">
      <div class="team blue">
        <div id="blue-name" class="team-name">Blue</div>
        <div id="blue-score" class="score">0</div>
        <div id="blue-series" class="series">Series: 0</div>
      </div>

      <div class="center">
        <div id="series-info">Game 1 / BO5</div>
        <div id="clock">5:00</div>
        <div id="overtime" class="hidden">OT</div>
      </div>

      <div class="team orange">
        <div id="orange-name" class="team-name">Orange</div>
        <div id="orange-score" class="score">0</div>
        <div id="orange-series" class="series">Series: 0</div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
